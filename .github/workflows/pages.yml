name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install typst
        uses: typst-community/setup-typst@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install presenterm
        run: cargo binstall presenterm --no-confirm

      - name: Export slides to HTML
        run: |
          cat > /tmp/presenterm-config.yaml << 'EOF'
          export:
            dimensions:
              rows: 35
              columns: 135
          EOF
          presenterm slides.md --export-html -c /tmp/presenterm-config.yaml

      - name: Prepare site
        run: |
          mkdir -p _site
          mv slides.html _site/index.html
          cp -r assets _site/assets 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
